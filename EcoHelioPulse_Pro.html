<div id="pro-visitor-counter" style="position:fixed; bottom:24px; left:24px; z-index:40; background:rgba(15,23,42,0.85); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:8px 14px; font-size:12px; font-weight:600; color:#e2e8f0; display:none; align-items:center; gap:8px; user-select:none; transition:all 0.3s; font-family:sans-serif;" onmouseover="this.style.transform='translateY(-2px)';" onmouseout="this.style.transform='none';">
  <span style="width:8px; height:8px; background:#10b981; border-radius:50%; display:inline-block; animation:proPulse 1.5s infinite;"></span>
  <span id="pro-counter-text">Views: ...</span>
</div>
<style>
@keyframes proPulse {
  0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16,185,129,0.7); }
  70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16,185,129,0); }
  100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16,185,129,0); }
}
</style>
<script>
  (function() {
    var isRu = true;
    try {
      isRu = document.documentElement.lang === 'ru' || document.title.indexOf('EcoPulse') === -1 || window.location.pathname.indexOf('/ru/') !== -1;
    } catch(e) {}
    var label = isRu ? "Просмотров: " : "Views: ";
    
    function showCount(val) {
      var el = document.getElementById('pro-visitor-counter');
      var textEl = document.getElementById('pro-counter-text');
      if (el && textEl) {
        textEl.textContent = label + val;
        el.style.display = 'flex';
      }
    }
    
    var today = new Date().toISOString().split('T')[0];
    var lastVisitDate = localStorage.getItem('solarify_pro_last_visit_date');
    var isNewVisitToday = lastVisitDate !== today;
    
    var endpoint = isNewVisitToday 
      ? 'https://countapi.mileshilliard.com/api/v1/hit/ecoheliopulse_pro'
      : 'https://countapi.mileshilliard.com/api/v1/get/ecoheliopulse_pro';
      
    fetch(endpoint)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var val = isNewVisitToday ? data.hit : data.value;
        if (typeof val === 'number') {
          showCount(val);
          if (isNewVisitToday) {
            try {
              localStorage.setItem('solarify_pro_last_visit_date', today);
            } catch(e){}
          }
        } else {
          loadLocal();
        }
      })
      .catch(function(err) {
        loadLocal();
      });
      
    function loadLocal() {
      var isLocalUnique = localStorage.getItem('solarify_pro_local_last_visit_date') !== today;
      var key = 'solarify_pro_local_views';
      var views = 0;
      try {
        views = parseInt(localStorage.getItem(key) || '0', 10);
      } catch(e){}
      if (isLocalUnique) {
        views += 1;
        try {
          localStorage.setItem(key, views);
          localStorage.setItem('solarify_pro_local_last_visit_date', today);
        } catch(e){}
      }
      showCount(views);
    }
  })();
</script>
</body>
