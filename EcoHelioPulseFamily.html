 для семьи`,panelLarge:`Мощная`,panelLargeDesc:`Для больших нужд`,panelQuantity:`Количество панелей:`,panelUnit:`шт.`,resultsTitle:`Результаты расчёта`,annualGen:`кВтч / год`,insolationInfo:`Расчет для инсоляции в`,enoughFor:`Этого хватит на:`,fridgeTitle:`Работа домашнего холодильника`,fridgeVal:`месяцев`,tvTitle:`Просмотр любимого ТВ`,tvVal:`часов`,phoneTitle:`Зарядки смартфона`,phoneVal:`раз`,ecoTitle:`Твой чистый вклад`,ecoDesc:`Уменьшение выбросов углекислого газа`,treesSavedTitle:`Твоя энергосистема спасет:`,treesSavedVal:`деревьев в год!`,forestLabel:`Твой лес`,emptyForest:`Установите больше панелей, чтобы посадить первые деревья! 🌳`,additionalTrees:`и еще +{count} деревьев за краем экрана! 🚀`,forestDesc:`Визуальный символ посаженных деревьев благодаря чистому солнцу.`,compareTitle:`Что это означает для экологии?`,coalSaved:`Сэкономленный уголь`,coalSavedDesc:`Мы не сожгли столько угля для выработки электричества`,petrolSaved:`Спасенный бензин`,petrolSavedDesc:`Столько бензина сбережено благодаря солнцу`,carOffset:`Пробег автомобиля`,carOffsetDesc:`Эквивалентно поездкам обычной машины на бензине`,eduTitle:`Солнечная наука для детей и взрослых! 💡`,eduIntro:`Солнечные панели — это как волшебные зеркала, которые ловят лучи солнца и превращают их в свет для наших игрушек и лампочек! Давай посмотрим, как это устроено:`,eduStep1:`1. Солнышко светит ☀️`,eduStep1Desc:`Лучи солнца летят на Землю. В этих лучах прячутся маленькие невидимые частички света — фотоны.`,eduStep2:`2. Ловушка для света 🔋`,eduStep2Desc:`Солнечная панель сделана из кремния (это как очень чистый песок). Когда фотон бьет по панели, он выбивает электрон, и получается электрический ток!`,eduStep3:`3. Превращение тока ⚡`,eduStep3Desc:`Ток из панели бежит в волшебную коробочку — инвертор. Он превращает ток в такой, какой нужен для розеток дома.`,eduStep4:`4. Свет дома! 🏡`,eduStep4Desc:`Теперь твой холодильник работает, телефон заряжается, а телевизор показывает мультики прямо от солнца!`,eduCompareHeading:`Сравниваем с углем и машинами! 🚂🚗`,eduCoalTitle:`Почему уголь вредный?`,eduCoalDesc:`Обычно электричество делают, сжигая черный уголь. От этого идет густой черный дым, который мешает птицам летать и портит наш воздух. Солнечные панели работают чисто и бесшумно!`,eduCarTitle:`Машины на бензине`,eduCarDesc:`Каждая поездка на машине тратит бензин и загрязняет воздух. Солнечная панель дает чистую энергию, которую можно использовать даже для зарядки электромобилей без вреда для природы!`,botName:`Солнышко`,botSubtitle:`Твой личный ИИ-помощник`,askPlaceholder:`Спроси о солнце...`,botGreeting:`Привет! Я твоё маленькое Солнышко ☀️. Я знаю всё-всё о солнечной энергии! Задавай любые вопросы — я объясню так просто, что поймет даже первоклассник! 🔋🌳`,botThinking:`Солнышко думает...`,botError:`Ой, что-то пошло не так! 😭 Проверь, пожалуйста, свой API ключ или попробуй спросить еще раз! ☀️`,botConnError:`Не могу соединиться с облачком знаний! ☁️ Пожалуйста, проверь интернет или воспользуйся быстыми кнопками ниже! ☀️`,qWash:`🧼 Как мыть панели?`,qRain:`🌧️ Ток в дождь?`,qTrees:`🌳 Сколько деревьев я спас?`,localWashAnswer:`Чистить панели очень весело и просто! ☀️ Обычной пыли мешает дождик, но если они стали грязными, их можно аккуратно помыть мягкой губкой с теплой водой утром или вечером, когда солнце не греет сильно! Главное — не использовать жесткие щетки, чтобы не поцарапать наши красивые стеклышки! 💧🧽`,localRainAnswer:`Да, даже в дождик и тучи наши панели работают! 🌧️ Конечно, они производят меньше энергии, чем под ярким солнышком (примерно 10-25%), но они ловят рассеянный свет, который проходит сквозь облака. А еще дождик бесплатно смывает всю пыль! 🌳🔋`,localTreesAnswer:`О, ты настоящий супергерой! 🦸‍♂️ Твоя система солнечных панелей сберегает планету и заменяет целых {count} деревьев! 🌳 Они поглощают CO₂ и делают наш воздух чистым и сладким! Продолжай в том же духе! ☀️💚`,localFallbackAnswer:`Ух ты, какой классный вопрос! ☀️ Чтобы я мог ответить на него подробно, пожалуйста, подключи меня к искусственному интеллекту, вставив Gemini API ключ в настройки вверху чата. Но помни: солнце — это суперсила! 🔋`,infoCardText:`Перейдите во вкладку "🌳 Мой Лес" или "💡 Как это работает?" вверху экрана, чтобы вырастить интерактивный лес и узнать, как устроена солнечная физика!`},en:{title:`EcoHelioPulse Family`,subtitle:`Your Sun — simple for everyone`,madeWithCare:`Made with care for the whole family`,proVersion:`💼 PRO Version`,tabDashboard:`☀️ Calculate`,tabForest:`🌳 My Forest`,tabEdu:`💡 How It Works?`,settingsAi:`Configure AI`,apiKeyConnected:`Gemini Connected`,apiModalTitle:`AI Key (Gemini)`,apiModalDesc:`We do not store your key on our servers. It is stored securely on your device in LocalStorage and is only used to talk to the Solar Helper.`,apiKeyPlaceholder:`Paste your Gemini API key`,apiModelLabel:`AI Model`,apiModelPlaceholder:`e.g., gemini-3.5-flash`,botTargetLabel:`Audience:`,botTargetChildYoung:`👶 7-10 yrs`,botTargetChildTeen:`👦 11-15 yrs`,botTargetAdult:`💼 16+`,apiGuideTitle:`How to get a free key:`,apiStep1:`Go to Google AI Studio`,apiStep2:`Click 'Get API Key' → 'Create API Key'`,apiStep3:`Copy the key and paste it below`,apiLinkText:`Open Google AI Studio`,visitorCounter:`Views: `,save:`Save`,delete:`Delete`,step1Title:`Step 1: Where is your home?`,searchPlaceholder:`Enter city, street or address...`,searchBtn:`Search`,latitude:`Latitude`,longitude:`Longitude`,notFound:`Sorry, address not found. Try entering a city or country.`,step2Title:`Step 2: Choose panels`,panelSmall:`Small`,panelSmallDesc:`For cabin or lighting`,panelMedium:`Medium`,panelMediumDesc:`Optimal for families`,panelLarge:`Powerful`,panelLargeDesc:`For larger needs`,panelQuantity:`Number of panels:`,panelUnit:`pcs`,resultsTitle:`Calculation Results`,annualGen:`kWh / year`,insolationInfo:`Calculated for insolation at`,enoughFor:`This is enough to run:`,fridgeTitle:`Domestic refrigerator operation`,fridgeVal:`months`,tvTitle:`Watching your favorite TV`,tvVal:`hours`, that can even charge electric cars without harming nature!`,botName:`Sunny`,botSubtitle:`Your Personal AI Helper`,askPlaceholder:`Ask about sun...`,botGreeting:`Hi! I am your little Sun ☀️. I know absolutely everything about solar energy! Ask me any questions — I will explain it so simply that even a first grader can understand! 🔋🌳`,botThinking:`Sun is thinking...`,botError:`Oh, something went wrong! 😭 Please check your API key or try asking again! ☀️`,botConnError:`Cannot connect to the cloud of knowledge! ☁️ Please check your internet or use the quick buttons below! ☀️`,qWash:`🧼 How to clean panels?`,qRain:`🌧️ Does it work in rain?`,qTrees:`🌳 How many trees did I save?`,localWashAnswer:`Cleaning panels is fun and easy! ☀️ Rain usually takes care of dust, but if they get dirty, you can gently wash them with a soft sponge and warm water in the morning or evening when they aren't too hot! Just don't use stiff brushes so you don't scratch our beautiful glass! 💧🧽`,localRainAnswer:`Yes, our panels work even in rain and cloudy weather! 🌧️ Of course, they produce less energy than under bright sun (about 10-25%), but they catch the scattered light that gets through the clouds. Plus, rain washes away all the dust for free! 🌳🔋`,localTreesAnswer:`Wow, you are a real superhero! 🦸‍♂️ Your solar panel system saves the planet and replaces as many as {count} trees! 🌳 They absorb CO₂ and keep our air fresh and clean! Keep it up! ☀️💚`,localFallbackAnswer:`Ooh, what a great question! ☀️ To let me answer in detail, please connect me to the AI by pasting your Gemini API key in the chat settings above. But remember: the sun is a superpower! 🔋`,infoCardText:`Go to the "🌳 My Forest" or "💡 How It Works?" tabs at the top of the screen to grow an interactive forest and see how solar science works!`},es:{title:`EcoHelioPulse Family`,subtitle:`Tu Sol — simple para todos`,madeWithCare:`Hecho con cariño para toda la familia`,proVersion:`💼 Versión PRO`,tabDashboard:`☀️ Calcular`,tabForest:`🌳 Mi B s plantados gracias a la energía solar pura.`,compareTitle:`¿Qué significa esto para el planeta?`,coalSaved:`Carbón ahorrado`,coalSavedDesc:`Evitamos quemar esta cantidad de carbón para generar electricidad`,petrolSaved:`Gasolina ahorrada`,petrolSavedDesc:`Cantidad de gasolina ahorrada gracias a la energía solar`,carOffset:`Kilometraje del auto`,carOffsetDesc:`Equivalente a conducir un auto común de gasolina`,eduTitle:`¡Ciencia Solar para Niños y Grandes! 💡`,eduIntro:`¡Los paneles solares son como espejos mágicos que atrapan los rayos solares y los convierten en electricidad para nuestros juguetes y lámparas! Veamos cómo funcionan:`,eduStep1:`1. El Sol Brilla ☀️`,eduStep1Desc:`La luz solar viaja a la Tierra. Pequeñas partículas invisibles de luz llamadas fotones se esconden dentro de estos rayos.`,eduStep2:`2. Atrapando la Luz 🔋`,eduStep2Desc:`El panel está hecho de silicio (como arena muy limpia). Cuando un fotón golpea el panel, libera un electrón, ¡creando corriente eléctrica!`,eduStep3:`3. Transformando la Corriente ⚡`,eduStep3Desc:`La corriente corre hacia una caja mágica llamada inversor. Convierte la electricidad en el tipo que necesitan los enchufes de tu casa.`,eduStep4:`4. ¡Energía en Casa! 🏡`,eduStep4Desc:`¡Ahora tu refrigerador funciona, el teléfono se carga y la tele muestra dibujos animados directamente desde el sol!`,eduCompareHeading:`¡Comparando con carbón y autos! 🚂🚗`,eduCoalTitle:`¿Por qué el carbón es malo?`,eduCoalDesc:`Normalmente, la electricidad se genera quemando carbón negro. Esto crea un humo negro espeso que dificulta el vuelo de las aves y daña nuestro aire. ¡Los paneles solares funcionan de forma limpia y silenciosa!`,eduCarTitle:`Autos de Gasolina`,eduCarDesc:`Cada viaje en auto gasta gasolina y contamina el aire. ¡Un panel solar proporciona energía limpia que incluso puede cargar autos eléctricos sin dañar la naturaleza!`,botName:`Solcito`,botSubtitle:`Tu Asistente de IA Personal`,askPlaceholder:`Pregunta sobre el sol...`,botGreeting:`¡Hola! Soy tu pequeño Sol ☀️. ¡Sé absolutamente todo sobre energía solar! Hazme cualquier pregunta, ¡te lo explicaré tan fácil que hasta un niño de primaria lo entenderá! 🔋🌳`,botThinking:`El Sol está pensando...`,botError:`¡Uy, algo salió mal! 😭 ¡Por favor revisa tu clave API o intenta preguntar de nuevo! ☀️`,botConnError:`¡No puedo conectarme a la nube del conocimiento! ☁️ ¡Por favor revisa tu internet o usa los botones rápidos de abajo! ☀️`,qWash:`🧼 ¿Cómo limpiar paneles?`,qRain:`🌧️ ¿Funciona con lluvia?`,qTrees:`🌳 ¿Cuántos árboles salvé?`,localWashAnswer:`¡Limpiar los paneles es divertido y fácil! ☀️ La lluvia suele encargarse del polvo, pero si se ensucian, puedes lavarlos suavemente con una esponja suave y agua tibia por la mañana o por la tarde, cuando no estén muy calientes. ¡No uses cepillos duros para no rayar nuestro hermoso vidrio! 💧🧽`,localRainAnswer:`¡Sí, nuestros paneles funcionan incluso con lluvia y clima nublado! 🌧️ Claro que producen menos energía que bajo un sol brillante (alrededor del 10-25%), pero atrapan la luz dispersa que atraviesa las nubes. ¡Además, la lluvia limpia el polvo gratis! 🌳🔋`,localTreesAnswer:`¡Wow, eres un verdadero superhéroe! 🦸‍♂️ ¡Tu sistema de paneles solares salva el planeta y reemplaza hasta {count} árboles! 🌳 ¡Absorben el CO₂ y mantienen nuestro aire fresco y limpio! ¡Sigue así! ☀️💚`,localFallbackAnswer:`¡Oh, qué buena pregunta! ☀️ Para que pueda responderte en detalle, por favor conéctame a la IA pegando tu clave API de Gemini en la configuración del chat arriba. Pero recuerda: ¡el sol es un superpoder! 🔋`,infoCardText:`¡Ve a la pestaña "🌳 Mi Bosque" o "💡 ¿Cómo funciona?" en la parte superior para cultivar un bosque interactivo y descubrir la ciencia del sol!`},de:{title:`EcoHelioPulse Family`,subtitle:`Deine Sonne — einfach für jeden`,madeWithCare:`Mit Liebe für die ganze Familie gemacht`,proVersion:`💼 PRO-Version`,tabDashboard:`☀️ Berechnen`,tabForest:`🌳 Mein Wald`,tabEdu:`💡 Wie klappt das?`,settingsAi:`KI konfigurie des Bildschirms! 🚀`,forestDesc:`Ein visuelles Symbol der gepflanzten Bäume dank reiner Sonnenenergie.`,compareTitle:`Was bedeutet das für den Planeten?`,coalSaved:`Kohle gespart`,coalSavedDesc:`So viel Kohle mussten wir nicht verbrennen, um Strom zu erzeugen`,petrolSaved:`Benzin gespart`,petrolSavedDesc:`So viel Benzin wurde dank Solarenergie eingespart`,carOffset:`Autokilometer`,carOffsetDesc:`Entspricht Fahrten mit einem normalen Benziner-Auto`,eduTitle:`Sonnenwissenschaft für Kinder & Erwachsene! 💡`,eduIntro:`Sonnenpaneele sind wie magische Spiegel, die Sonnenstrahlen einfangen und sie in Strom für unsere Spielzeuge und Lampen verwandeln! Mal sehen, wie das funktioniert:`,eduStep1:`1. Die Sonne scheint ☀️`,eduStep1Desc:`Sonnenlicht reist zur Erde. Winzige, unsichtbare Lichtteilchen namens Photonen verstecken sich in diesen Strahlen.`,eduStep2:`2. Licht einfangen 🔋`,eduStep2Desc:`Das Paneel besteht aus Silizium (wie sehr sauberer Sand). Wenn ein Photon auf das Paneel trifft, schlägt es ein Elektron frei und erzeugt elektrischen Strom!`,eduStep3:`3. Strom umwandeln ⚡`,eduStep3Desc:`Der Strom fließt in eine Box namens Wechselrichter. Er wandelt ihn in die Art von Strom um, die deine Steckdosen zu Hause brauchen.`,eduStep4:`4. Strom für Zuhause! 🏡`,eduStep4Desc:`Jetzt läuft der Kühlschrank, das Telefon lädt und der Fernseher zeigt Zeichentrickfilme direkt von der Sonne!`,eduCompareHeading:`Vergleich mit Kohle und Autos! 🚂🚗`,eduCoalTitle:`Warum ist Kohle schlecht?`,eduCoalDesc:`Normalerweise wird Strom durch Verbrennen von Steinkohle erzeugt. Das erzeugt dicken schwarzen Rauch, der Vögeln das Fliegen erschwert und unsere Luft verdirbt. Solaranlagen arbeiten sauber und leise!`,eduCarTitle:`Benzin-Autos`,eduCarDesc:`Jede Autofahrt verbraucht Benzin und verschmutzt die Luft. Ein Solarpanel liefert saubere Energie, mit der man sogar Elektroautos aufladen kann, ohne der Natur zu schaden!`,botName:`Sönnchen`,botSubtitle:`Dein persönlicher KI-Helfer`,askPlaceholder:`Frage zur Sonne...`,botGreeting:`Hallo! Ich bin deine kleine Sonne ☀️. Ich weiß absolut alles über Solarenergie! Frag mich was du willst — ich erkläre es so einfach, dass selbst ein Erstklässler es versteht! 🔋🌳`,botThinking:`Sonne denkt nach...`,botError:`Oh, etwas ist schiefgelaufen! 😭 Bitte überprüfe deinen API-Schlüssel oder versuche es noch einmal! ☀️`,botConnError:`Verbindung zur Wissenswolke fehlgeschlagen! ☁️ Bitte überprüfe das Internet oder nutze die Schnellwahltasten unten! ☀️`,qWash:`🧼 Wie Paneele reinigen?`,qRain:`🌧️ Funktioniert bei Regen?`,qTrees:`🌳 Wie viele Bäume gerettet?`,localWashAnswer:`Das Reinigen der Paneele macht Spaß und ist ganz einfach! ☀️ Regen spült den meisten Staub weg. Wenn sie aber doch schmutzig sind, wasche sie einfach morgens oder abends vorsichtig mit einem weichen Schwamm und warmem Wasser ab, wenn sie nicht zu heiß sind! Benutze keine harten Bürsten, um das schöne Glas nicht zu zerkratzen! 💧🧽`,localRainAnswer:`Ja, unsere Paneele funktionieren auch bei Regen und Wolken! 🌧️ Sie erzeugen zwar weniger Energie als bei praller Sonne (ca. 10-25%), aber sie fangen das Streulicht ein, das durch die Wolken dringt. Außerdem wäscht der Regen den Staub gratis ab! 🌳🔋`,localTreesAnswer:`Wow, du bist ein echter Superheld! 🦸‍♂️ Deine Solaranlage schont den Planeten und ersetzt stolze {count} Bäume! 🌳 Sie nehmen CO₂ auf und halten unsere Luft frisch und sauber! Mach weiter so! ☀️💚`,localFallbackAnswer:`Oh, das ist eine tolle Frage! ☀️ Damit ich dir ausführlich antworten kann, verbinde mich bitte mit der KI, indem du deinen Gemini-API-Schlüssel in die Chat-Einstellungen oben einträgst. Aber denk dran: Die Sonne ist eine Superkraft! 🔋`,infoCardText:`Gehe oben auf die Reiter "🌳 Mein Wald" oder "💡 Wie klappt das?", um einen interaktiven Wald wachsen zu lassen und die Sonnenwissenschaft zu erforschen!`},zh:{title:`EcoHelioPulse Family`,subtitle:`你的太阳 — 每个人的绿色选择`,madeWithCare:`为全家人精心打造`,proVersion:`💼 专业版`,tabDashboard:`☀️ 智能计算`,tabForest:`🌳 专属森林`,tabEdu:`💡 太阳
